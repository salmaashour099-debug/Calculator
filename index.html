<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I am just a calculator</title>
    <link rel="stylesheet" href="calc.css">
</head>
<body>

    <div class="container" id="calculator">
                <h1>calculator</h1>
                <input type="text" placeholder="0" id="output" readonly>
                <div class="buttons">
                    <button class="clear" onclick="clr()">CLR</button>
                    <button class="delete" onclick="del()">DEL</button>
                    <button class="opr"  onclick="display('%')">%</button>
                    <button class="opr"  onclick="display('/')">/</button>
                    <button onclick="display('7')">7</button>
                    <button onclick="display('8')">8</button>
                    <button onclick="display('9')">9</button>
                    <button class="opr" onclick="display('*')">*</button>
                    <button onclick="display('4')">4</button>
                    <button onclick="display('5')">5</button>
                    <button onclick="display('6')">6</button>
                    <button class="opr"  onclick="display('-')">-</button>
                    <button onclick="display('1')">1</button>
                    <button onclick="display('2')">2</button>
                    <button onclick="display('3')">3</button>
                    <button class="opr"  onclick="display('+')">+</button>
                    <button onclick="display('.')">.</button>
                    <button onclick="display('0')">0</button>
                    <button onclick="calculate()" class="equal">=</button>
                </div>
    </div>
    <script src="calc.js"></script>
</body>
</html>
